<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Cream flag background with subtle inner border -->
  <rect width="64" height="64" rx="6" fill="#FAF6E9"/>
  <rect x="3" y="3" width="58" height="58" rx="4" fill="none" stroke="#0E3386" stroke-width="0.6" opacity="0.25"/>
  <!-- Big royal-blue W (Cubs win flag) -->
  <text x="32" y="49" text-anchor="middle"
        font-family="Impact, 'Arial Black', sans-serif"
        font-size="54" font-weight="900" fill="#0E3386"
        letter-spacing="-2">W</text>
</svg>
